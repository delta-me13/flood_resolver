name: RUST
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-native:
    name: Building (${{ matrix.os }} - ${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-aarch64

    steps:
      - uses: actions/checkout@v2

      - name: Install Rust ToolChain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
    
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build Release
        run: cargo build --release --target ${{ matrix.target }}
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/

  build-cross-windows:
    name: Cross Compile Windows (Linux via cargo-xwin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc-xwin
          
      - name: Install cargo-xwin
        run: cargo install cargo-xwin
        
      - name: Build with cargo-xwin
        run: cargo xwin build --release --target x86_64-pc-windows-msvc
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64-xwin
          path: target/x86_64-pc-windows-msvc/release/